title: V3RCondo
description: "Manual do usuário e documentação oficial do V3RCondo — gestão inteligente de condomínios."
lang: pt-BR
url: https://docs.v3rcondo.com.br
permalink: pretty

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

defaults:
  - scope:
      path: ""
    values:
      layout: default

# Tema / cor
color_scheme: v3rcondo
logo: "/assets/logo.svg"

# Busca
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

# Callouts (admonitions do MkDocs convertidos)
callouts:
  note:
    title: Nota
    color: blue
  tip:
    title: Dica
    color: green
  warning:
    title: Atenção
    color: yellow
  important:
    title: Importante
    color: red
  example:
    title: Exemplo
    color: purple

# Links auxiliares (canto superior direito)
aux_links:
  "Acessar o V3RCondo":
    - "https://v3rcondo.com.br"
aux_links_new_tab: true

# Rodapé
footer_content: '© 2026 V3RTECH. Todos os direitos reservados. · <a href="/legal/termos/">Termos de Uso</a> · <a href="/legal/privacidade/">Privacidade</a>'
last_edit_timestamp: false
back_to_top: true
back_to_top_text: "Voltar ao topo"

# Excluir do build
exclude:
  - "*.sh"
  - README.md
